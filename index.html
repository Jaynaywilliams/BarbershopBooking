
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Barbershop Booking</title>
  <meta name="description" content="Book your appointment at our barbershop." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <h1>Book Your Appointment</h1>
  </header>

  <main>
    <form id="booking-form" autocomplete="on">
      <label>
        Name
        <input type="text" name="name" placeholder="First Last" required />
      </label>
      <label>
        Phone
        <input type="tel" name="phone" placeholder="(555) 123-4567" required />
      </label>
      <label>
        Service
        <select name="service" required>
          <option value="Haircut">Haircut</option>
          <option value="Beard Trim">Beard Trim</option>
          <option value="Haircut + Beard">Haircut + Beard</option>
        </select>
      </label>
      <label>
        Barber
        <select name="barber" required>
          <option value="Any">Any</option>
          <option value="Barber 1">Barber 1</option>
          <option value="Barber 2">Barber 2</option>
        </select>
      </label>
      <label>
        Date & Time
        <input type="datetime-local" name="start" required />
      </label>

      <button type="submit">Book Appointment</button>
      <p id="status" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script src="./script.js"></script>
</body>
</html>
